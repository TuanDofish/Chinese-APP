<!doctype html>
<html lang="vi">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>VNChinese Admin</title>
    <link rel="icon" href="data:," />
    <link rel="stylesheet" href="./styles.css?v=20260619-admin-ui-hsk" />
  </head>
  <body>
    <section id="adminLogin" class="login-gate">
      <form id="adminLoginForm" class="login-panel">
        <div class="brand-mark">文</div>
        <p class="eyebrow">VNChinese Control Center</p>
        <h1>Đăng nhập quản trị</h1>
        <p>Quản lý nội dung học, video, nguồn báo, AI và người dùng trong cùng một hệ thống.</p>
        <label>Email admin<input id="adminEmail" type="email" value="admin@vnchinese.local" required /></label>
        <label>Mật khẩu<input id="adminPassword" type="password" required /></label>
        <button class="primary-button" type="submit">Đăng nhập</button>
        <button id="offlineAdminBtn" class="ghost-button" type="button">Quản lý nội dung offline</button>
        <p id="adminLoginError" class="login-error"></p>
      </form>
    </section>

    <div id="appShell" class="app-shell is-hidden">
      <aside class="sidebar">
        <div class="brand">
          <div class="brand-mark">文</div>
          <div>
            <strong>VNChinese</strong>
            <span>Quản trị app</span>
          </div>
        </div>

        <nav class="nav-list" aria-label="Admin modules">
          <button class="nav-item is-active" data-view="dashboard" title="Tổng quan">
            <span class="nav-icon">⌂</span><span>Tổng quan</span>
          </button>
          <button class="nav-item" data-view="vocabulary" title="Quản lý từ vựng">
            <span class="nav-icon">字</span><span>Từ vựng</span>
          </button>
          <button class="nav-item" data-view="flashcards" title="Quản lý flashcard">
            <span class="nav-icon">▧</span><span>Flashcard</span>
          </button>
          <button class="nav-item" data-view="lessons" title="Quản lý bài học">
            <span class="nav-icon">≡</span><span>Bài học</span>
          </button>
          <button class="nav-item" data-view="videos" title="Video và transcript">
            <span class="nav-icon">▶</span><span>Video & transcript</span>
          </button>
          <button class="nav-item" data-view="reading" title="Nguồn đọc và bài đọc">
            <span class="nav-icon">读</span><span>Đọc hiểu</span>
          </button>
          <button class="nav-item" data-view="speaking" title="Tình huống luyện nói và phát âm">
            <span class="nav-icon">声</span><span>Luyện nói</span>
          </button>
          <button class="nav-item" data-view="games" title="Quiz và trò chơi">
            <span class="nav-icon">?</span><span>Quiz & trò chơi</span>
          </button>
          <button class="nav-item" data-view="users" title="Quản lý người dùng">
            <span class="nav-icon">◎</span><span>Người dùng</span>
          </button>
          <button class="nav-item" data-view="ai" title="Cấu hình AI">
            <span class="nav-icon">AI</span><span>Trung tâm AI</span>
          </button>
          <button class="nav-item" data-view="review" title="Kiểm duyệt nội dung">
            <span class="nav-icon">✓</span><span>Kiểm duyệt</span>
          </button>
          <button class="nav-item" data-view="settings" title="Cấu hình hệ thống">
            <span class="nav-icon">⚙</span><span>Cấu hình</span>
          </button>
        </nav>

        <div class="sidebar-footer">
          <button id="adminLogoutBtn" class="ghost-button" title="Đăng xuất admin">Đăng xuất</button>
          <button id="exportBundleBtn" class="ghost-button" title="Xuất content bundle">⇩ Xuất bundle</button>
          <label class="ghost-button file-trigger" title="Import flashcards/index.json">
            ⇧ Import JSON
            <input id="importJsonInput" type="file" accept="application/json" />
          </label>
        </div>
      </aside>

      <main class="workspace">
        <header class="topbar">
          <div>
            <p class="eyebrow">Quản trị nội dung VNChinese</p>
            <h1 id="viewTitle">Tổng quan</h1>
          </div>
          <div class="top-actions">
            <span id="adminIdentity" class="admin-identity">Offline admin</span>
            <span id="apiStatus" class="api-status">API chưa kiểm tra</span>
            <button id="publishContentBtn" class="primary-button" title="Xuất bản nội dung sang app user">Xuất bản</button>
            <div class="search-box">
              <span>⌕</span>
              <input id="globalSearch" type="search" placeholder="Tìm từ, chủ đề, người dùng..." />
            </div>
            <button id="qaButton" class="icon-button" title="Chạy kiểm tra chất lượng">✓</button>
            <button id="resetButton" class="icon-button danger" title="Khôi phục dữ liệu mẫu">↺</button>
          </div>
        </header>

        <section id="viewRoot" class="view-root" aria-live="polite"></section>
      </main>
    </div>

    <dialog id="editorDialog" class="editor-dialog">
      <form method="dialog" id="editorForm">
        <div class="dialog-head">
          <div>
            <p class="eyebrow" id="dialogEyebrow">Chỉnh sửa</p>
            <h2 id="dialogTitle">Nội dung</h2>
          </div>
          <button value="cancel" class="icon-button" title="Đóng">×</button>
        </div>
        <div id="dialogFields" class="dialog-fields"></div>
        <menu class="dialog-actions">
          <button value="cancel" class="ghost-button">Hủy</button>
          <button id="saveDialogBtn" value="default" class="primary-button">Lưu thay đổi</button>
        </menu>
      </form>
    </dialog>

    <input id="imageUploadInput" class="hidden-file" type="file" accept="image/*" />
    <div id="toast" class="toast" role="status"></div>
    <script src="./app.js?v=20260619-admin-ui-hsk"></script>
  </body>
</html>
