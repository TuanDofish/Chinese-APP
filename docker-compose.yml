services:
  postgres:
    image: postgres:15-alpine
    container_name: chinese_app_db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: chinese_app
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:alpine
    container_name: chinese_app_redis
    ports:
      - "6379:6379"

  adminer:
    image: adminer
    container_name: chinese_app_adminer
    ports:
      # VNChinese Admin web uses host port 8080. Keep Adminer on 8081
      # to avoid "127.0.0.1 refused to connect" / port conflict during demo.
      - "8081:8080"
    environment:
      ADMINER_DEFAULT_SERVER: postgres

volumes:
  postgres_data:
